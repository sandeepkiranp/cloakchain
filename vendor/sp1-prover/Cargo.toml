[package]
edition = "2021"
rust-version = "1.88"
name = "sp1-prover"
version = "6.2.3"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "The SP1 prover implementation"
readme = "README.md"
keywords = [
    "sp1",
    "succinct",
    "zero-knowledge",
    "zkvm",
]
categories = ["cryptography"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/succinctlabs/sp1"

[features]
bigint-rug = ["sp1-core-machine/bigint-rug"]
debug = ["sp1-core-machine/debug"]
experimental = []
mprotect = [
    "experimental",
    "sp1-core-executor/mprotect",
    "sp1-core-executor-runner/mprotect",
    "sp1-core-machine/mprotect",
    "sp1-hypercube/mprotect",
